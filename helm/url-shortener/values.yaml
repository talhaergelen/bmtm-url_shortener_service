# values.yaml — Helm Chart Varsayılan Değerleri
#
# Bu dosya ne işe yarar?
#   Helm chart'ının tüm özelleştirilebilir değerlerini tanımlar.
#   Kullanıcı bu değerleri override edebilir:
#     helm install url-shortener ./helm/url-shortener --set replicaCount=3
#
# Aşamalar:
#   Development → values.yaml (bu dosya)
#   Production  → helm install ... --values prod-values.yaml

# ─────────────────────────────────────────────────────────
# UYGULAMA AYARLARI
# ─────────────────────────────────────────────────────────
replicaCount: 2

image:
  repository: url-shortener
  pullPolicy: IfNotPresent
  tag: "latest"

# ─────────────────────────────────────────────────────────
# SERVİS AYARLARI
# ─────────────────────────────────────────────────────────
service:
  type: NodePort
  port: 8000
  nodePort: 30080

# ─────────────────────────────────────────────────────────
# ORTAM DEĞİŞKENLERİ
# ─────────────────────────────────────────────────────────
env:
  DATABASE_URL: "sqlite:////tmp/urlshortener.db"
  BASE_URL: "http://localhost:30080"
  AWS_ENDPOINT_URL: "http://localstack:4566"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET_NAME: "url-shortener-stats"

# ─────────────────────────────────────────────────────────
# KAYNAK LİMİTLERİ
# ─────────────────────────────────────────────────────────
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# ─────────────────────────────────────────────────────────
# SAĞLIK KONTROLLERİ
# ─────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ─────────────────────────────────────────────────────────
# AUTOSCALING (HPA — Horizontal Pod Autoscaler)
# ─────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ─────────────────────────────────────────────────────────
# CONFIG MAP
# ─────────────────────────────────────────────────────────
configMap:
  enabled: true

# ─────────────────────────────────────────────────────────
# INGRESS (Dışarıdan erişim)
# ─────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: url-shortener.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ─────────────────────────────────────────────────────────
# POD AYARLARI
# ─────────────────────────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# ─────────────────────────────────────────────────────────
# NODE SEÇIMI
# ─────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ─────────────────────────────────────────────────────────
# VOLUME
# ─────────────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: "standard"
  accessMode: ReadWriteOnce
  size: 1Gi
